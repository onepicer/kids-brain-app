// init.gradle - 将 Flutter Maven 仓库替换为本地镜像
def localFlutterRepo = new File(rootProject.projectDir, "flutter-local-repo").toURI().toString()

settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories {
            maven { url = uri(localFlutterRepo) }
        }
    }
}

allprojects {
    buildscript {
        repositories {
            maven { url = uri(localFlutterRepo) }
        }
    }
    repositories {
        maven { url = uri(localFlutterRepo) }
    }
}

// Hook into dependency resolution to redirect storage.googleapis.com/download.flutter.io
afterEvaluate { project ->
    project.configurations.all { config ->
        config.resolutionStrategy {
            eachDependency { details ->
                if (details.requested.group == 'io.flutter') {
                    details.useTarget "io.flutter:${details.requested.name}:${details.requested.version}"
                }
            }
        }
    }
}
