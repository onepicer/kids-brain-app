<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枪战小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 3px solid #4a4a6a;
            border-radius: 10px;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #ui div {
            margin: 5px 0;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
            display: none;
        }
        #gameOver h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 32px;
        }
        #gameOver p {
            margin: 10px 0;
            font-size: 20px;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #restartBtn:hover {
            transform: scale(1.1);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>🎯 分数：<span id="score">0</span></div>
            <div>❤️ 生命：<span id="lives">3</span></div>
            <div>🔫 弹药：<span id="ammo">30</span>/30</div>
        </div>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终分数：<span id="finalScore">0</span></p>
            <p>消灭敌人：<span id="enemiesKilled">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
        <div id="instructions">
            WASD/方向键移动 | 鼠标瞄准 | 左键射击 | R 换弹 | P 暂停
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const ammoEl = document.getElementById('ammo');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const enemiesKilledEl = document.getElementById('enemiesKilled');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏状态
        let gameRunning = true;
        let paused = false;
        let score = 0;
        let enemiesKilled = 0;

        // 玩家
        const player = {
            x: 400,
            y: 300,
            radius: 20,
            speed: 5,
            color: '#4ecca3',
            angle: 0,
            lives: 3,
            ammo: 30,
            maxAmmo: 30,
            reloading: false,
            reloadTime: 2000
        };

        // 输入
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };

        // 游戏对象
        let bullets = [];
        let enemies = [];
        let particles = [];
        let enemySpawnRate = 2000;
        let lastEnemySpawn = 0;

        // 事件监听
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r' && !player.reloading && player.ammo < player.maxAmmo) {
                reload();
            }
            if (e.key.toLowerCase() === 'p') {
                paused = !paused;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => mouse.down = true);
        canvas.addEventListener('mouseup', () => mouse.down = false);

        restartBtn.addEventListener('click', restartGame);

        function reload() {
            player.reloading = true;
            setTimeout(() => {
                player.ammo = player.maxAmmo;
                player.reloading = false;
                updateUI();
            }, player.reloadTime);
        }

        function shoot() {
            if (player.ammo > 0 && !player.reloading) {
                player.ammo--;
                bullets.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(player.angle) * 15,
                    vy: Math.sin(player.angle) * 15,
                    radius: 5,
                    color: '#ffff00'
                });
                updateUI();
            } else if (player.ammo === 0 && !player.reloading) {
                reload();
            }
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: x = Math.random() * canvas.width; y = -30; break;
                case 1: x = canvas.width + 30; y = Math.random() * canvas.height; break;
                case 2: x = Math.random() * canvas.width; y = canvas.height + 30; break;
                case 3: x = -30; y = Math.random() * canvas.height; break;
            }

            enemies.push({
                x, y,
                radius: 15 + Math.random() * 10,
                speed: 1 + Math.random() * 2,
                color: '#e94560',
                health: 1 + Math.floor(score / 500)
            });
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    radius: Math.random() * 4 + 2,
                    color,
                    life: 1
                });
            }
        }

        function update() {
            if (!gameRunning || paused) return;

            // 玩家移动
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // 边界限制
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // 玩家角度
            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

            // 射击
            if (mouse.down) shoot();

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                return bullet.x > 0 && bullet.x < canvas.width && 
                       bullet.y > 0 && bullet.y < canvas.height;
            });

            // 生成敌人
            const now = Date.now();
            if (now - lastEnemySpawn > Math.max(500, enemySpawnRate - score / 10)) {
                spawnEnemy();
                lastEnemySpawn = now;
            }

            // 更新敌人
            enemies = enemies.filter(enemy => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                // 碰撞检测 - 敌人碰到玩家
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer < player.radius + enemy.radius) {
                    player.lives--;
                    createParticles(player.x, player.y, player.color, 20);
                    updateUI();
                    if (player.lives <= 0) {
                        endGame();
                    }
                    return false;
                }

                // 碰撞检测 - 子弹击中敌人
                bullets = bullets.filter(bullet => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist < enemy.radius + bullet.radius) {
                        enemy.health--;
                        createParticles(enemy.x, enemy.y, enemy.color, 5);
                        if (enemy.health <= 0) {
                            score += 100;
                            enemiesKilled++;
                            createParticles(enemy.x, enemy.y, enemy.color, 15);
                            updateUI();
                        }
                        return false;
                    }
                    return true;
                });

                return enemy.health > 0;
            });

            // 更新粒子
            particles = particles.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= 0.02;
                particle.vx *= 0.95;
                particle.vy *= 0.95;
                return particle.life > 0;
            });

            updateUI();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(74, 74, 106, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 绘制粒子
            particles.forEach(particle => {
                ctx.globalAlpha = particle.life;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // 绘制子弹
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制敌人
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 敌人眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(enemy.x - 5, enemy.y - 5, 4, 0, Math.PI * 2);
                ctx.arc(enemy.x + 5, enemy.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制玩家
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // 身体
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 枪
            ctx.fillStyle = '#666';
            ctx.fillRect(0, -5, 30, 10);
            
            ctx.restore();

            // 换弹指示
            if (player.reloading) {
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('换弹中...', player.x, player.y - 35);
            }

            // 暂停提示
            if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            livesEl.textContent = player.lives;
            ammoEl.textContent = player.ammo;
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            enemiesKilledEl.textContent = enemiesKilled;
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            gameRunning = true;
            paused = false;
            score = 0;
            enemiesKilled = 0;
            player.x = 400;
            player.y = 300;
            player.lives = 3;
            player.ammo = player.maxAmmo;
            player.reloading = false;
            bullets = [];
            enemies = [];
            particles = [];
            gameOverEl.style.display = 'none';
            updateUI();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
