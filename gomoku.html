<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - Gomoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-info {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .current-player {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .current-player span {
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 5px;
        }
        
        .black-turn span {
            background: #333;
            color: white;
        }
        
        .white-turn span {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
        }
        
        .board {
            background: #dcb35c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            gap: 0;
            position: relative;
        }
        
        .cell {
            width: 30px;
            height: 30px;
            position: relative;
            cursor: pointer;
        }
        
        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #000;
            transform: translateY(-50%);
        }
        
        .cell::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #000;
            transform: translateX(-50%);
        }
        
        /* Remove lines from edges */
        .cell.top-edge::after { top: 50%; }
        .cell.bottom-edge::after { bottom: 50%; }
        .cell.left-edge::before { left: 50%; }
        .cell.right-edge::before { right: 50%; }
        
        .piece {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: all 0.2s ease;
        }
        
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
        }
        
        .piece.last-move {
            box-shadow: 0 0 0 3px #ff6b6b, 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .restart-btn {
            background: #ff6b6b;
            color: white;
        }
        
        .restart-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        .undo-btn {
            background: #4ecdc4;
            color: white;
        }
        
        .undo-btn:hover {
            background: #45b7af;
            transform: translateY(-2px);
        }
        
        .winner-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .winner-modal.show {
            display: flex;
        }
        
        .winner-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .winner-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .winner-content .winner-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .history {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            max-width: 450px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .history-list {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🎮 五子棋 Gomoku</h1>
    
    <div class="game-info">
        <div class="current-player black-turn" id="currentPlayer">
            当前回合：<span class="black-piece">● 黑棋</span>
        </div>
        <div>步数：<span id="moveCount">0</span></div>
    </div>
    
    <div class="board">
        <div class="grid" id="grid"></div>
    </div>
    
    <div class="controls">
        <button class="undo-btn" onclick="undo()">↩ 悔棋</button>
        <button class="restart-btn" onclick="restart()">🔄 重新开始</button>
    </div>
    
    <div class="history">
        <h3>📜 落子记录</h3>
        <div class="history-list" id="historyList">暂无记录</div>
    </div>
    
    <div class="winner-modal" id="winnerModal">
        <div class="winner-content">
            <div class="winner-icon" id="winnerIcon">🏆</div>
            <h2 id="winnerText">黑棋获胜！</h2>
            <button class="restart-btn" onclick="restart()">再来一局</button>
        </div>
    </div>
    
    <script>
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;
        
        let board = [];
        let currentPlayer = BLACK;
        let gameOver = false;
        let moveHistory = [];
        let moveCount = 0;
        
        function initBoard() {
            board = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = EMPTY;
                }
            }
        }
        
        function renderBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    // Edge styling
                    if (i === 0) cell.classList.add('top-edge');
                    if (i === BOARD_SIZE - 1) cell.classList.add('bottom-edge');
                    if (j === 0) cell.classList.add('left-edge');
                    if (j === BOARD_SIZE - 1) cell.classList.add('right-edge');
                    
                    cell.addEventListener('click', () => makeMove(i, j));
                    grid.appendChild(cell);
                }
            }
        }
        
        function makeMove(row, col) {
            if (gameOver || board[row][col] !== EMPTY) return;
            
            // Place piece
            board[row][col] = currentPlayer;
            moveCount++;
            
            // Add to history
            moveHistory.push({ row, col, player: currentPlayer });
            
            // Render piece
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            const piece = document.createElement('div');
            piece.className = `piece ${currentPlayer === BLACK ? 'black' : 'white'}`;
            
            // Mark last move
            document.querySelectorAll('.piece.last-move').forEach(p => p.classList.remove('last-move'));
            piece.classList.add('last-move');
            
            cell.appendChild(piece);
            
            // Check win
            if (checkWin(row, col, currentPlayer)) {
                gameOver = true;
                showWinner(currentPlayer);
                return;
            }
            
            // Check draw
            if (moveCount >= BOARD_SIZE * BOARD_SIZE) {
                gameOver = true;
                showDraw();
                return;
            }
            
            // Switch player
            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            updateUI();
        }
        
        function checkWin(row, col, player) {
            const directions = [
                [[0, 1], [0, -1]],   // Horizontal
                [[1, 0], [-1, 0]],   // Vertical
                [[1, 1], [-1, -1]], // Diagonal \
                [[1, -1], [-1, 1]]  // Diagonal /
            ];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                count += countInDirection(row, col, dir1[0], dir1[1], player);
                count += countInDirection(row, col, dir2[0], dir2[1], player);
                if (count >= 5) return true;
            }
            return false;
        }
        
        function countInDirection(row, col, dRow, dCol, player) {
            let count = 0;
            let r = row + dRow;
            let c = col + dCol;
            
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                count++;
                r += dRow;
                c += dCol;
            }
            return count;
        }
        
        function undo() {
            if (moveHistory.length === 0 || gameOver) return;
            
            const lastMove = moveHistory.pop();
            board[lastMove.row][lastMove.col] = EMPTY;
            
            // Remove piece from DOM
            const cell = document.querySelector(`.cell[data-row="${lastMove.row}"][data-col="${lastMove.col}"]`);
            if (cell.lastChild && cell.lastChild.classList.contains('piece')) {
                cell.removeChild(cell.lastChild);
            }
            
            // Mark previous last move
            document.querySelectorAll('.piece.last-move').forEach(p => p.classList.remove('last-move'));
            if (moveHistory.length > 0) {
                const prevMove = moveHistory[moveHistory.length - 1];
                const prevCell = document.querySelector(`.cell[data-row="${prevMove.row}"][data-col="${prevMove.col}"]`);
                if (prevCell.lastChild) {
                    prevCell.lastChild.classList.add('last-move');
                }
            }
            
            currentPlayer = lastMove.player;
            moveCount--;
            updateUI();
            updateHistory();
        }
        
        function restart() {
            initBoard();
            renderBoard();
            currentPlayer = BLACK;
            gameOver = false;
            moveHistory = [];
            moveCount = 0;
            document.getElementById('winnerModal').classList.remove('show');
            updateUI();
            updateHistory();
        }
        
        function showWinner(player) {
            const modal = document.getElementById('winnerModal');
            const text = document.getElementById('winnerText');
            const icon = document.getElementById('winnerIcon');
            
            text.textContent = player === BLACK ? '⚫ 黑棋获胜！' : '⚪ 白棋获胜！';
            icon.textContent = '🏆';
            modal.classList.add('show');
        }
        
        function showDraw() {
            const modal = document.getElementById('winnerModal');
            const text = document.getElementById('winnerText');
            const icon = document.getElementById('winnerIcon');
            
            text.textContent = '🤝 平局！';
            icon.textContent = '🤝';
            modal.classList.add('show');
        }
        
        function updateUI() {
            const playerDiv = document.getElementById('currentPlayer');
            const countSpan = document.getElementById('moveCount');
            
            if (currentPlayer === BLACK) {
                playerDiv.className = 'current-player black-turn';
                playerDiv.innerHTML = '当前回合：<span class="black-piece">● 黑棋</span>';
            } else {
                playerDiv.className = 'current-player white-turn';
                playerDiv.innerHTML = '当前回合：<span class="white-piece">⚪ 白棋</span>';
            }
            
            countSpan.textContent = moveCount;
            updateHistory();
        }
        
        function updateHistory() {
            const historyList = document.getElementById('historyList');
            if (moveHistory.length === 0) {
                historyList.textContent = '暂无记录';
                return;
            }
            
            const recentMoves = moveHistory.slice(-10).map((move, idx) => {
                const actualIdx = moveHistory.length - 10 + idx + 1;
                const coord = `${String.fromCharCode(65 + move.col)}${14 - move.row}`;
                const piece = move.player === BLACK ? '●' : '⚪';
                return `${actualIdx}. ${piece} ${coord}`;
            });
            
            if (moveHistory.length > 10) {
                historyList.textContent = '... (省略早期记录)\n' + recentMoves.join('\n');
            } else {
                historyList.textContent = recentMoves.join('\n');
            }
        }
        
        // Initialize game
        initBoard();
        renderBoard();
        updateUI();
    </script>
</body>
</html>
