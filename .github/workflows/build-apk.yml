name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'kids-brain-app/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: kids-brain-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: kids-brain-app/build/app/outputs/flutter-apk/app-release.apk
